name: Deploy demo to GitHub Pages

# A scheduled build plays the role of the caching backend: it fetches
# CelesTrak (curated NAME queries), bakes the validated snapshot into
# static JSON, and redeploys the site — browsers never hit CelesTrak.
on:
  push:
    branches: [main]
  schedule:
    - cron: '23 1,7,13,19 * * *' # every 6 hours
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -e ./backend

      - name: Export orbital-data snapshot from CelesTrak
        working-directory: backend
        run: python -m app.export_static --out ../frontend/public/data

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Build static site
        working-directory: frontend
        env:
          VITE_STATIC_DATA: '1'
        run: npm run build -- --base=/open-sar-orbits/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - id: deployment
        uses: actions/deploy-pages@v4
