<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d1117" />
    <meta
      name="description"
      content="Open SAR Orbits — interactive 3D explorer for SAR satellite constellations, orbits, ground tracks and AOI pass prediction."
    />
    <meta name="author" content="Pavan Muguda Sanjeevamurthy" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Open SAR Orbits — SAR Constellation Explorer</title>
    <script>
      // seed DARK/PAPER before first paint
      const root = document.documentElement;
      root.dataset.theme =
        localStorage.getItem('theme') ||
        (matchMedia('(prefers-color-scheme: light)').matches ? 'paper' : 'dark');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
