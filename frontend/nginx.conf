server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # proxy API calls to the backend service (docker-compose network)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # long cache for hashed assets and the Cesium static bundle
    location ~* \.(js|css|png|jpg|svg|woff2?|ktx2|wasm|json|xml)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
